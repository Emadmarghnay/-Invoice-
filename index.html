<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#0F3D3E">
<title>فواتير | Invoices</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiSW52b2ljZXMiLCJzaG9ydF9uYW1lIjoiSW52b2ljZXMiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI0Y3RjRFRSIsInRoZW1lX2NvbG9yIjoiIzBGM0QzRSJ9">
<style>
  @font-face {
    font-family: 'Cairo';
    src: local('Cairo');
  }
  :root{
    --ink:#12312E;
    --paper:#F7F4EE;
    --card:#FFFFFF;
    --teal:#0F3D3E;
    --teal-light:#1C5C56;
    --brass:#B98A3C;
    --brass-soft:#EFE0C2;
    --line:#DAD3C3;
    --danger:#A6402F;
    --radius:14px;
    --shadow: 0 1px 2px rgba(18,49,46,.06), 0 8px 24px -12px rgba(18,49,46,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);}
  body{
    font-family:'Segoe UI', 'Tahoma', system-ui, sans-serif;
    min-height:100vh;
    padding-bottom:84px;
  }
  [dir="ltr"] body{font-family:'Segoe UI', system-ui, sans-serif;}

  /* Top bar */
  header.topbar{
    position:sticky; top:0; z-index:20;
    background:var(--teal); color:#F7F4EE;
    padding:16px 18px 14px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow: var(--shadow);
  }
  header.topbar .brand{display:flex; align-items:center; gap:10px;}
  header.topbar .mark{
    width:34px; height:34px; border-radius:9px;
    background:var(--brass); color:var(--teal);
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:16px;
  }
  header.topbar h1{font-size:17px; margin:0; font-weight:700; letter-spacing:.2px;}
  header.topbar .sub{font-size:11px; opacity:.75; margin-top:1px;}
  .lang-toggle{
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
    color:#F7F4EE; border-radius:20px; padding:6px 12px; font-size:12px;
    cursor:pointer; font-weight:600;
  }

  main{padding:16px; max-width:640px; margin:0 auto;}

  /* Summary strip */
  .summary{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;
    margin-bottom:18px;
  }
  .summary .stat{
    background:var(--card); border-radius:var(--radius); padding:12px 10px;
    box-shadow:var(--shadow); text-align:center;
  }
  .summary .stat .num{font-size:18px; font-weight:800; color:var(--teal);}
  .summary .stat .lbl{font-size:10.5px; color:#6B6455; margin-top:2px;}

  h2.section-title{
    font-size:13px; font-weight:700; color:#6B6455;
    text-transform:uppercase; letter-spacing:.6px;
    margin:22px 0 10px; display:flex; align-items:center; gap:8px;
  }
  h2.section-title::after{content:""; flex:1; height:1px; background:var(--line);}

  /* Invoice list */
  .inv-card{
    background:var(--card); border-radius:var(--radius);
    padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow);
    display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; border:1px solid transparent;
    transition:transform .12s ease, border-color .12s ease;
  }
  .inv-card:active{transform:scale(.98);}
  .inv-card .left .num{font-weight:700; font-size:14.5px;}
  .inv-card .left .client{font-size:12.5px; color:#6B6455; margin-top:2px;}
  .inv-card .right{text-align:end;}
  .inv-card .right .amt{font-weight:800; font-size:15px; color:var(--teal);}
  .status-pill{
    display:inline-block; font-size:10px; font-weight:700; padding:3px 9px;
    border-radius:20px; margin-top:4px;
  }
  .status-paid{background:#DEEFE0; color:#256B37;}
  .status-due{background:var(--brass-soft); color:#8A6423;}

  .empty{
    text-align:center; padding:38px 20px; color:#8A8375;
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
  }
  .empty .icon{font-size:30px; margin-bottom:8px;}
  .empty p{font-size:13px; margin:4px 0 0;}

  /* FAB */
  .fab{
    position:fixed; bottom:22px; inset-inline-end:20px; z-index:30;
    width:58px; height:58px; border-radius:50%;
    background:var(--brass); color:var(--teal);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:400; border:none;
    box-shadow:0 10px 24px -8px rgba(185,138,60,.6);
    cursor:pointer;
  }

  /* Modal / sheet */
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(18,49,46,.45);
    z-index:40; display:none; align-items:flex-end;
  }
  .sheet-backdrop.open{display:flex;}
  .sheet{
    background:var(--paper); width:100%; max-height:92vh; overflow-y:auto;
    border-radius:20px 20px 0 0; padding:18px 18px 26px;
    animation:slideUp .22s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .sheet-handle{width:38px; height:4px; background:var(--line); border-radius:4px; margin:0 auto 14px;}
  .sheet h3{margin:0 0 16px; font-size:17px;}

  label{display:block; font-size:12.5px; color:#6B6455; font-weight:600; margin:12px 0 5px;}
  input, select, textarea{
    width:100%; padding:11px 12px; border-radius:10px;
    border:1.5px solid var(--line); background:var(--card);
    font-size:14.5px; color:var(--ink); font-family:inherit;
  }
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--teal-light);}

  .items-list .item-row{
    display:grid; grid-template-columns:1fr 56px 74px 30px; gap:6px;
    align-items:center; margin-bottom:8px;
  }
  .items-list .item-row input{padding:9px 8px; font-size:13px;}
  .item-row .del{
    background:none; border:none; color:var(--danger); font-size:18px;
    cursor:pointer; padding:0;
  }
  .add-item-btn{
    width:100%; padding:10px; border:1.5px dashed var(--line); border-radius:10px;
    background:none; color:var(--teal-light); font-weight:700; font-size:13px;
    cursor:pointer; margin-top:4px;
  }

  .totals-box{
    background:var(--card); border-radius:12px; padding:14px 16px; margin-top:16px;
    box-shadow:var(--shadow);
  }
  .totals-box .row{display:flex; justify-content:space-between; font-size:13.5px; padding:4px 0;}
  .totals-box .row.grand{
    border-top:1.5px dashed var(--line); margin-top:6px; padding-top:10px;
    font-weight:800; font-size:16px; color:var(--teal);
  }

  .btn-primary{
    width:100%; padding:14px; border:none; border-radius:12px;
    background:var(--teal); color:#F7F4EE; font-weight:700; font-size:15px;
    margin-top:18px; cursor:pointer;
  }
  .btn-secondary{
    width:100%; padding:12px; border:1.5px solid var(--line); border-radius:12px;
    background:none; color:var(--ink); font-weight:600; font-size:13.5px;
    margin-top:8px; cursor:pointer;
  }
  .btn-danger-text{
    width:100%; padding:10px; border:none; background:none;
    color:var(--danger); font-weight:600; font-size:13px; margin-top:6px; cursor:pointer;
  }

  /* Invoice detail / print preview */
  .doc{
    background:#fff; border-radius:var(--radius); padding:22px 20px;
    box-shadow:var(--shadow); font-size:13px;
  }
  .doc-head{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid var(--teal); padding-bottom:14px;}
  .doc-head .biz{font-weight:800; font-size:16px; color:var(--teal);}
  .doc-head .biz small{display:block; font-weight:400; color:#6B6455; font-size:11px; margin-top:2px;}
  .doc-head .meta{text-align:end; font-size:11.5px; color:#6B6455;}
  .doc-head .meta .inv-no{font-weight:800; color:var(--ink); font-size:14px;}
  .doc-parties{display:flex; justify-content:space-between; margin:16px 0; font-size:12px;}
  .doc-parties .lbl{color:#8A8375; font-size:10.5px; text-transform:uppercase; letter-spacing:.4px;}
  table.doc-table{width:100%; border-collapse:collapse; margin-top:8px;}
  table.doc-table th{
    text-align:start; font-size:10.5px; text-transform:uppercase; letter-spacing:.3px;
    color:#8A8375; border-bottom:1.5px solid var(--line); padding:6px 4px;
  }
  table.doc-table td{padding:8px 4px; border-bottom:1px solid var(--line); font-size:12.5px;}
  table.doc-table td.num, table.doc-table th.num{text-align:end;}
  .doc-totals{margin-top:10px; margin-inline-start:auto; width:60%;}
  .doc-totals .row{display:flex; justify-content:space-between; padding:4px 0; font-size:12.5px;}
  .doc-totals .row.grand{border-top:1.5px solid var(--teal); margin-top:4px; padding-top:8px; font-weight:800; font-size:15px; color:var(--teal);}
  .doc-foot{margin-top:18px; text-align:center; font-size:11px; color:#8A8375; border-top:1px dashed var(--line); padding-top:10px;}

  .actions-row{display:flex; gap:8px; margin-top:14px;}
  .actions-row button{flex:1;}

  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{position:absolute; inset-inline-start:0; top:0; width:100%; padding:0;}
    .fab, header.topbar{display:none;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="mark">IN</div>
    <div>
      <h1 id="appTitle">فواتير</h1>
      <div class="sub" id="appSub">إدارة فواتير الصيانة</div>
    </div>
  </div>
  <button class="lang-toggle" id="langBtn" onclick="toggleLang()">EN</button>
</header>

<main>
  <div class="summary">
    <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl" id="lblTotal">إجمالي الفواتير</div></div>
    <div class="stat"><div class="num" id="statDue">0</div><div class="lbl" id="lblDue">غير مدفوعة</div></div>
    <div class="stat"><div class="num" id="statRevenue">0</div><div class="lbl" id="lblRevenue">إجمالي المحصّل (د.إ)</div></div>
  </div>

  <h2 class="section-title" id="listTitle">الفواتير</h2>
  <div id="invoiceList"></div>
</main>

<button class="fab" onclick="openNewInvoice()">+</button>

<!-- New/Edit Invoice Sheet -->
<div class="sheet-backdrop" id="invoiceSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="sheetTitle">فاتورة جديدة</h3>

    <label id="lblClientName">اسم العميل</label>
    <input type="text" id="clientName" placeholder="مثال: أحمد محمد">

    <label id="lblClientPhone">رقم الهاتف</label>
    <input type="tel" id="clientPhone" placeholder="05xxxxxxxx">

    <label id="lblService">نوع الخدمة</label>
    <select id="serviceType">
      <option value="ac" data-ar="صيانة تكييف" data-en="AC Repair">صيانة تكييف</option>
      <option value="fridge" data-ar="إصلاح ثلاجة" data-en="Fridge Repair">إصلاح ثلاجة</option>
      <option value="washer" data-ar="إصلاح غسالة" data-en="Washer Repair">إصلاح غسالة</option>
      <option value="general" data-ar="صيانة عامة" data-en="General Maintenance">صيانة عامة</option>
    </select>

    <h2 class="section-title" id="itemsTitle" style="margin-top:20px;">البنود</h2>
    <div class="items-list" id="itemsList"></div>
    <button class="add-item-btn" id="addItemBtn" onclick="addItemRow()">+ إضافة بند</button>

    <label id="lblVat">نسبة الضريبة (VAT %)</label>
    <input type="number" id="vatRate" value="5" min="0" max="100">

    <div class="totals-box">
      <div class="row"><span id="lblSubtotal">المجموع الفرعي</span><span id="calcSubtotal">0.00</span></div>
      <div class="row"><span id="lblVatAmt">قيمة الضريبة</span><span id="calcVat">0.00</span></div>
      <div class="row grand"><span id="lblGrandTotal">الإجمالي</span><span id="calcGrand">0.00</span></div>
    </div>

    <button class="btn-primary" id="saveBtn" onclick="saveInvoice()">حفظ الفاتورة</button>
    <button class="btn-secondary" onclick="closeSheet('invoiceSheet')" id="cancelBtn">إلغاء</button>
  </div>
</div>

<!-- Invoice Detail Sheet -->
<div class="sheet-backdrop" id="detailSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="printArea"></div>
    <div class="actions-row">
      <button class="btn-secondary" onclick="markPaid()" id="btnMarkPaid">تعليم كمدفوعة</button>
      <button class="btn-secondary" onclick="window.print()" id="btnPrint">طباعة / PDF</button>
    </div>
    <button class="btn-danger-text" onclick="deleteInvoice()" id="btnDelete">حذف الفاتورة</button>
    <button class="btn-secondary" onclick="closeSheet('detailSheet')" id="btnClose">إغلاق</button>
  </div>
</div>

<script>
/* ---------- i18n ---------- */
let lang = localStorage.getItem('inv_lang') || 'ar';
const T = {
  ar:{ title:'فواتير', sub:'إدارة فواتير الصيانة', totalInv:'إجمالي الفواتير', dueInv:'غير مدفوعة', revenue:'إجمالي المحصّل (د.إ)',
       listTitle:'الفواتير', newInv:'فاتورة جديدة', editInv:'تعديل الفاتورة', clientName:'اسم العميل', clientPhone:'رقم الهاتف',
       service:'نوع الخدمة', items:'البنود', addItem:'+ إضافة بند', vat:'نسبة الضريبة (VAT %)', subtotal:'المجموع الفرعي',
       vatAmt:'قيمة الضريبة', grand:'الإجمالي', save:'حفظ الفاتورة', cancel:'إلغاء', markPaid:'تعليم كمدفوعة', markDue:'تعليم كغير مدفوعة',
       print:'طباعة / PDF', del:'حذف الفاتورة', close:'إغلاق', emptyTitle:'لا توجد فواتير بعد', emptyBody:'اضغط + لإنشاء أول فاتورة',
       paid:'مدفوعة', due:'مستحقة', itemDesc:'الوصف', itemQty:'الكمية', itemPrice:'السعر', invNo:'فاتورة رقم', date:'التاريخ',
       billTo:'فاتورة إلى', qtyShort:'كمية', priceShort:'سعر', totalShort:'إجمالي', thankYou:'شكرًا لتعاملكم معنا',
       confirmDelete:'هل تريد حذف هذه الفاتورة؟' },
  en:{ title:'Invoices', sub:'Maintenance Invoice Manager', totalInv:'Total Invoices', dueInv:'Unpaid', revenue:'Total Collected (AED)',
       listTitle:'Invoices', newInv:'New Invoice', editInv:'Edit Invoice', clientName:'Client Name', clientPhone:'Phone Number',
       service:'Service Type', items:'Items', addItem:'+ Add Item', vat:'VAT Rate (%)', subtotal:'Subtotal',
       vatAmt:'VAT Amount', grand:'Grand Total', save:'Save Invoice', cancel:'Cancel', markPaid:'Mark as Paid', markDue:'Mark as Unpaid',
       print:'Print / PDF', del:'Delete Invoice', close:'Close', emptyTitle:'No invoices yet', emptyBody:'Tap + to create your first invoice',
       paid:'Paid', due:'Due', itemDesc:'Description', itemQty:'Qty', itemPrice:'Price', invNo:'Invoice No.', date:'Date',
       billTo:'Bill To', qtyShort:'Qty', priceShort:'Price', totalShort:'Total', thankYou:'Thank you for your business',
       confirmDelete:'Delete this invoice?' }
};

function applyLang(){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('langBtn').textContent = lang === 'ar' ? 'EN' : 'AR';
  const t = T[lang];
  appTitle.textContent = t.title;
  appSub.textContent = t.sub;
  lblTotal.textContent = t.totalInv;
  lblDue.textContent = t.dueInv;
  lblRevenue.textContent = t.revenue;
  listTitle.textContent = t.listTitle;
  lblClientName.textContent = t.clientName;
  lblClientPhone.textContent = t.clientPhone;
  lblService.textContent = t.service;
  itemsTitle.textContent = t.items;
  addItemBtn.textContent = t.addItem;
  lblVat.textContent = t.vat;
  lblSubtotal.textContent = t.subtotal;
  lblVatAmt.textContent = t.vatAmt;
  lblGrandTotal.textContent = t.grand;
  saveBtn.textContent = t.save;
  cancelBtn.textContent = t.cancel;
  btnPrint.textContent = t.print;
  btnDelete.textContent = t.del;
  btnClose.textContent = t.close;
  document.querySelectorAll('#serviceType option').forEach(o=>{
    o.textContent = o.dataset[lang];
  });
  document.querySelectorAll('.item-row input.desc').forEach(i=>{
    i.placeholder = t.itemDesc;
  });
  renderList();
}
function toggleLang(){
  lang = lang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('inv_lang', lang);
  applyLang();
}

/* ---------- Data layer (localStorage) ---------- */
const STORE_KEY = 'inv_invoices_v1';
function getInvoices(){ return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
function setInvoices(list){ localStorage.setItem(STORE_KEY, JSON.stringify(list)); }
function nextInvoiceNumber(){
  const list = getInvoices();
  const year = new Date().getFullYear();
  const countThisYear = list.filter(i => i.number.includes(String(year))).length + 1;
  return `INV-${year}-${String(countThisYear).padStart(3,'0')}`;
}

let editingId = null;

/* ---------- Item rows ---------- */
function addItemRow(desc='', qty=1, price=''){
  const t = T[lang];
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = `
    <input type="text" class="desc" placeholder="${t.itemDesc}" value="${desc}" oninput="recalc()">
    <input type="number" class="qty" min="0" step="1" value="${qty}" oninput="recalc()">
    <input type="number" class="price" min="0" step="0.01" placeholder="0.00" value="${price}" oninput="recalc()">
    <button class="del" onclick="this.parentElement.remove(); recalc();">×</button>
  `;
  itemsList.appendChild(row);
}

function recalc(){
  let subtotal = 0;
  document.querySelectorAll('#itemsList .item-row').forEach(row=>{
    const qty = parseFloat(row.querySelector('.qty').value) || 0;
    const price = parseFloat(row.querySelector('.price').value) || 0;
    subtotal += qty * price;
  });
  const vatRate = parseFloat(document.getElementById('vatRate').value) || 0;
  const vatAmt = subtotal * (vatRate/100);
  const grand = subtotal + vatAmt;
  calcSubtotal.textContent = subtotal.toFixed(2);
  calcVat.textContent = vatAmt.toFixed(2);
  calcGrand.textContent = grand.toFixed(2);
}
document.getElementById('vatRate').addEventListener('input', recalc);

/* ---------- Sheets ---------- */
function openSheet(id){ document.getElementById(id).classList.add('open'); }
function closeSheet(id){ document.getElementById(id).classList.remove('open'); }

function openNewInvoice(){
  editingId = null;
  sheetTitle.textContent = T[lang].newInv;
  clientName.value = '';
  clientPhone.value = '';
  serviceType.selectedIndex = 0;
  vatRate.value = 5;
  itemsList.innerHTML = '';
  addItemRow();
  recalc();
  openSheet('invoiceSheet');
}

function saveInvoice(){
  const name = clientName.value.trim();
  if(!name){ clientName.focus(); return; }
  const items = [];
  document.querySelectorAll('#itemsList .item-row').forEach(row=>{
    const desc = row.querySelector('.desc').value.trim();
    const qty = parseFloat(row.querySelector('.qty').value) || 0;
    const price = parseFloat(row.querySelector('.price').value) || 0;
    if(desc) items.push({desc, qty, price});
  });
  if(items.length === 0){ return; }

  const vatR = parseFloat(vatRate.value) || 0;
  const subtotal = items.reduce((s,i)=>s+i.qty*i.price,0);
  const vatAmt = subtotal * (vatR/100);
  const grand = subtotal + vatAmt;

  const list = getInvoices();

  if(editingId){
    const idx = list.findIndex(i=>i.id === editingId);
    if(idx > -1){
      list[idx] = {...list[idx], clientName:name, clientPhone:clientPhone.value.trim(),
        service:serviceType.value, items, vatRate:vatR, subtotal, vatAmt, grand};
    }
  } else {
    list.unshift({
      id: 'id_' + Date.now(),
      number: nextInvoiceNumber(),
      date: new Date().toISOString().slice(0,10),
      clientName:name, clientPhone:clientPhone.value.trim(),
      service:serviceType.value, items, vatRate:vatR, subtotal, vatAmt, grand,
      status:'due'
    });
  }
  setInvoices(list);
  closeSheet('invoiceSheet');
  renderList();
}

let currentDetailId = null;

function openDetail(id){
  currentDetailId = id;
  const inv = getInvoices().find(i=>i.id===id);
  if(!inv) return;
  renderDoc(inv);
  const t = T[lang];
  btnMarkPaid.textContent = inv.status==='paid' ? t.markDue : t.markPaid;
  openSheet('detailSheet');
}

function renderDoc(inv){
  const t = T[lang];
  const serviceLabel = document.querySelector(`#serviceType option[value="${inv.service}"]`);
  const serviceName = serviceLabel ? serviceLabel.dataset[lang] : inv.service;
  let rows = '';
  inv.items.forEach(it=>{
    rows += `<tr><td>${it.desc}</td><td class="num">${it.qty}</td><td class="num">${it.price.toFixed(2)}</td><td class="num">${(it.qty*it.price).toFixed(2)}</td></tr>`;
  });
  printArea.innerHTML = `
    <div class="doc">
      <div class="doc-head">
        <div class="biz">EmiratesFix<small>${lang==='ar'?'صيانة الأجهزة المنزلية والتكييف':'Home Appliance & AC Maintenance'}</small></div>
        <div class="meta">
          <div class="inv-no">${inv.number}</div>
          <div>${t.date}: ${inv.date}</div>
          <div style="margin-top:4px;"><span class="status-pill ${inv.status==='paid'?'status-paid':'status-due'}">${inv.status==='paid'?t.paid:t.due}</span></div>
        </div>
      </div>
      <div class="doc-parties">
        <div><div class="lbl">${t.billTo}</div><div>${inv.clientName}</div><div>${inv.clientPhone||''}</div></div>
        <div style="text-align:end;"><div class="lbl">${t.service}</div><div>${serviceName}</div></div>
      </div>
      <table class="doc-table">
        <thead><tr><th>${t.itemDesc}</th><th class="num">${t.qtyShort}</th><th class="num">${t.priceShort}</th><th class="num">${t.totalShort}</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="doc-totals">
        <div class="row"><span>${t.subtotal}</span><span>${inv.subtotal.toFixed(2)}</span></div>
        <div class="row"><span>${t.vatAmt} (${inv.vatRate}%)</span><span>${inv.vatAmt.toFixed(2)}</span></div>
        <div class="row grand"><span>${t.grand}</span><span>${inv.grand.toFixed(2)} ${lang==='ar'?'د.إ':'AED'}</span></div>
      </div>
      <div class="doc-foot">${t.thankYou}</div>
    </div>
  `;
}

function markPaid(){
  const list = getInvoices();
  const idx = list.findIndex(i=>i.id===currentDetailId);
  if(idx>-1){
    list[idx].status = list[idx].status === 'paid' ? 'due' : 'paid';
    setInvoices(list);
    renderDoc(list[idx]);
    btnMarkPaid.textContent = list[idx].status==='paid' ? T[lang].markDue : T[lang].markPaid;
    renderList();
  }
}

function deleteInvoice(){
  if(!confirm(T[lang].confirmDelete)) return;
  let list = getInvoices();
  list = list.filter(i=>i.id!==currentDetailId);
  setInvoices(list);
  closeSheet('detailSheet');
  renderList();
}

/* ---------- List + stats ---------- */
function renderList(){
  const t = T[lang];
  const list = getInvoices();
  statTotal.textContent = list.length;
  statDue.textContent = list.filter(i=>i.status==='due').length;
  const revenue = list.filter(i=>i.status==='paid').reduce((s,i)=>s+i.grand,0);
  statRevenue.textContent = revenue.toFixed(0);

  if(list.length === 0){
    invoiceList.innerHTML = `<div class="empty"><div class="icon">🧾</div><div style="font-weight:700;">${t.emptyTitle}</div><p>${t.emptyBody}</p></div>`;
    return;
  }
  invoiceList.innerHTML = list.map(inv => `
    <div class="inv-card" onclick="openDetail('${inv.id}')">
      <div class="left">
        <div class="num">${inv.number}</div>
        <div class="client">${inv.clientName}</div>
      </div>
      <div class="right">
        <div class="amt">${inv.grand.toFixed(2)} ${lang==='ar'?'د.إ':'AED'}</div>
        <span class="status-pill ${inv.status==='paid'?'status-paid':'status-due'}">${inv.status==='paid'?t.paid:t.due}</span>
      </div>
    </div>
  `).join('');
}

/* ---------- Init ---------- */
applyLang();
</script>
</body>
</html>
